version: "3.9"

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  kafka-net:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  delta-data:

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── ZooKeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: zookeeper
    restart: unless-stopped
    networks: [kafka-net]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
      ZOOKEEPER_SYNC_LIMIT:  2
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka Broker 1 ─────────────────────────────────────────────────────────
  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-1
    container_name: kafka-1
    restart: unless-stopped
    networks: [kafka-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"      # external (host) access
      - "29092:29092"    # internal (container) access
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS:             "INTERNAL://kafka-1:29092,EXTERNAL://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME:       INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:    1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS:              168        # 7 days
      KAFKA_LOG_SEGMENT_BYTES:                1073741824 # 1 GB
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS:  300000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "false"   # explicit topic creation
      KAFKA_NUM_PARTITIONS:                   6
      KAFKA_DEFAULT_REPLICATION_FACTOR:       1
      KAFKA_COMPRESSION_TYPE:                 lz4
      KAFKA_JMX_PORT:                         9101
      KAFKA_JMX_HOSTNAME:                     kafka-1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Schema Registry ────────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    container_name: schema-registry
    restart: unless-stopped
    networks: [kafka-net]
    depends_on:
      kafka-1:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME:                    schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka-1:29092"
      SCHEMA_REGISTRY_LISTENERS:                    "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC:             _schemas
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    networks: [kafka-net]
    depends_on:
      kafka-1:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:                  local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS:      "kafka-1:29092"
      KAFKA_CLUSTERS_0_ZOOKEEPER:             "zookeeper:2181"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY:        "http://schema-registry:8081"
      DYNAMIC_CONFIG_ENABLED:                 "true"

  # ── Topic Initializer (one-shot) ───────────────────────────────────────────
  topic-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: topic-init
    networks: [kafka-net]
    depends_on:
      kafka-1:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Creating Kafka topics...' &&
        kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists
          --topic clickstream-events
          --partitions 6
          --replication-factor 1
          --config retention.ms=604800000
          --config compression.type=lz4 &&
        kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists
          --topic clickstream-events-dlq
          --partitions 1
          --replication-factor 1
          --config retention.ms=2592000000 &&
        echo 'Topics created:' &&
        kafka-topics --bootstrap-server kafka-1:29092 --list
      "
    restart: "no"

  # ── Clickstream Producer ───────────────────────────────────────────────────
  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.producer
    container_name: clickstream-producer
    restart: unless-stopped
    networks: [kafka-net]
    depends_on:
      topic-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:29092"
      KAFKA_TOPIC:             clickstream-events
      EVENTS_PER_SECOND:       "200"
      BATCH_SIZE:              "100"
      NUM_USERS:               "1000"
    command: ["python", "producer/clickstream_producer.py"]

  # ── Spark Structured Streaming Consumer ───────────────────────────────────
  consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.consumer
    container_name: clickstream-consumer
    restart: unless-stopped
    networks: [kafka-net]
    depends_on:
      kafka-1:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:29092"
      KAFKA_TOPIC:             clickstream-events
      DELTA_BASE_PATH:         /data/delta/clickstream
      CHECKPOINT_BASE:         /data/checkpoints/clickstream
      TRIGGER_INTERVAL_SECS:   "30"
      WATERMARK_MINUTES:       "5"
    volumes:
      - delta-data:/data
    command: >
      spark-submit
        --master local[4]
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,io.delta:delta-spark_2.12:3.1.0
        --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
        --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
        consumer/streaming_consumer.py
